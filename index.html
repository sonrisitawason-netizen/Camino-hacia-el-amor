<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Corriendo Hacia Ti</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Nunito:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  #gameWrapper {
    position: relative;
    width: 800px;
    max-width: 100vw;
  }

  #gameTitle {
    text-align: center;
    color: #ffd6e7;
    font-family: 'Dancing Script', cursive;
    font-size: 2rem;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(255, 150, 200, 0.8);
  }

  #gameCanvas {
    display: block;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(255, 100, 180, 0.4), 0 0 120px rgba(180, 50, 255, 0.2);
    border: 2px solid rgba(255, 200, 230, 0.3);
  }

  #ui {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding: 0 4px;
  }

  #score, #lives, #stage {
    color: #ffd6e7;
    font-size: 0.9rem;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(255,150,200,0.6);
  }

  #instructions {
    text-align: center;
    color: rgba(255, 200, 230, 0.6);
    font-size: 0.75rem;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }

  #loveMessage {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-family: 'Dancing Script', cursive;
    font-size: 1.3rem;
    text-shadow: 0 0 20px rgba(255,150,200,1);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 5;
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <div id="gameTitle">💖 Corriendo Hacia Ti</div>
  <div style="position:relative">
    <canvas id="gameCanvas" width="800" height="320"></canvas>
    <div id="loveMessage"></div>
  </div>
  <div id="ui">
    <span id="score">💖 Cartas: 0</span>
    <span id="stage">✨ Camino de los Recuerdos</span>
    <span id="lives">❤️❤️❤️</span>
  </div>
  <div id="instructions">ESPACIO / ↑ para saltar · ↓ para agacharse · Toca la pantalla para saltar</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Audio Context ──
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol=0.3) {
  try {
    const a = getAudio();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(); o.stop(a.currentTime + dur);
  } catch(e){}
}
function playJump() { playTone(400,'sine',0.15,0.2); playTone(600,'sine',0.1,0.15); }
function playCollect() {
  [523,659,784,1047].forEach((f,i) => setTimeout(()=>playTone(f,'sine',0.15,0.25),i*60));
}
function playHit() { playTone(200,'sawtooth',0.2,0.3); }
function playWin() {
  [523,659,784,880,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.4,0.4),i*100));
}

// ── Stages ──
const stages = [
  { name:"✨ Camino de los Recuerdos", sky:['#2d1b69','#11998e'], ground:'#7b3f8c', accent:'#c084fc' },
  { name:"🌧️ Camino de los Desafíos", sky:['#1a1a2e','#16213e'], ground:'#4a2040', accent:'#f472b6' },
  { name:"🌙 Camino de los Sueños", sky:['#0f0c29','#302b63'], ground:'#1e3a5f', accent:'#60a5fa' },
  { name:"🌟 Camino Final", sky:['#f093fb','#f5576c'], ground:'#c2185b', accent:'#ffd700' }
];

// ── Game State ──
let state = 'start'; // start, playing, dead, win
let score = 0, lives = 3, stageIndex = 0, stageProgress = 0;
let speed = 4, frameCount = 0;
let hearts = [], floatingTexts = [], particles = [], stars = [], bgPetals = [];

const loveMessages = [
  "💌 Contigo todo se siente más bonito.",
  "💌 Eres mi lugar favorito.",
  "💌 Cada momento contigo vale oro.",
  "💌 Tu sonrisa ilumina mis días.",
  "💌 Si volviera a elegir, te elegiría otra vez.",
  "💌 Gracias por existir.",
  "💌 Eres mi pensamiento favorito.",
  "💌 A tu lado todo tiene sentido.",
  "💌 Mi lugar feliz eres tú.",
  "💌 Hoy celebramos a la persona más especial."
];
let msgIndex = 0;

// ── Ground & Layout ──
const GROUND_Y = H - 70;
const GROUND_H = 70;

// ── Player ──
const player = {
  x: 100, y: GROUND_Y - 50, w: 36, h: 50,
  vy: 0, onGround: true, ducking: false,
  jumpCount: 0, maxJumps: 2,
  invincible: 0, blinkTimer: 0,
  collectAnim: 0
};

// ── Obstacles ──
let obstacles = [];
let collectibles = [];
let lastObstacle = 0, lastCollectible = 0;

const obstacleTypes = [
  { label:'☁️', w:60, h:35, color:'#9ca3af', sym:'☁️', name:'nube de dudas' },
  { label:'⏰', w:30, h:45, color:'#fbbf24', sym:'⏰', name:'reloj' },
  { label:'🧱', w:25, h:55, color:'#78716c', sym:'🧱', name:'muro' },
  { label:'🌵', w:25, h:50, color:'#4ade80', sym:'🌵', name:'espinas' },
  { label:'💨', w:50, h:30, color:'#bfdbfe', sym:'💨', name:'viento' }
];

const collectibleTypes = [
  { sym:'💌', pts:10, msg:true, color:'#ff80b5' },
  { sym:'💖', pts:5,  msg:false, color:'#f43f5e' },
  { sym:'🌹', pts:7,  msg:false, color:'#dc2626' },
  { sym:'✨', pts:3,  msg:false, color:'#fbbf24' }
];

// ── Stars ──
for(let i=0;i<80;i++) stars.push({ x:Math.random()*W, y:Math.random()*(GROUND_Y-20), r:Math.random()*1.5+0.3, twinkle:Math.random()*Math.PI*2, speed:Math.random()*0.5+0.2 });

// ── BG Petals ──
for(let i=0;i<15;i++) bgPetals.push({ x:Math.random()*W, y:Math.random()*GROUND_Y, size:Math.random()*8+4, rot:Math.random()*Math.PI*2, speed:Math.random()*1+0.5, drift:Math.random()*0.5-0.25, color:`hsl(${Math.random()*60+300},80%,80%)` });

// ── Input ──
const keys = {};
let jumpPressed = false;
document.addEventListener('keydown', e => {
  if(['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  if(!keys[e.code]) {
    keys[e.code] = true;
    if((e.code==='Space'||e.code==='ArrowUp') && (state==='playing')) doJump();
    if(state==='start'||state==='dead') startGame();
    if(state==='win') { state='start'; }
  }
});
document.addEventListener('keyup', e => { keys[e.code]=false; });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if(state==='playing') doJump();
  else if(state==='start'||state==='dead') startGame();
  else if(state==='win') state='start';
}, {passive:false});

function doJump() {
  if(player.jumpCount < player.maxJumps) {
    player.vy = player.jumpCount===0 ? -14 : -11;
    player.onGround = false;
    player.jumpCount++;
    playJump();
    for(let i=0;i<8;i++) particles.push({
      x: player.x+player.w/2, y: player.y+player.h,
      vx:(Math.random()-0.5)*3, vy:Math.random()*-3,
      life:1, color:'rgba(255,180,230,0.8)', r:3
    });
  }
}

// ── Girlfriend character (end) ──
const girlfriend = { x: W + 200, y: GROUND_Y - 56, w: 34, h: 56, arrived: false, cakeAnim: 0 };

// ── Start ──
function startGame() {
  state = 'playing';
  score = 0; lives = 3; stageIndex = 0; stageProgress = 0;
  speed = 4; frameCount = 0;
  obstacles = []; collectibles = [];
  hearts = []; floatingTexts = []; particles = [];
  player.y = GROUND_Y - player.h; player.vy = 0; player.onGround = true;
  player.ducking = false; player.jumpCount = 0; player.invincible = 0;
  girlfriend.x = W + 200; girlfriend.arrived = false;
  msgIndex = 0;
  document.getElementById('loveMessage').style.opacity = 0;
  updateUI();
}

// ── Spawn ──
function spawnObstacle() {
  const t = obstacleTypes[Math.floor(Math.random()*obstacleTypes.length)];
  const isFloat = t.sym==='☁️'||t.sym==='💨';
  const y = isFloat ? GROUND_Y - t.h - 30 - Math.random()*20 : GROUND_Y - t.h;
  obstacles.push({ ...t, x: W+10, y, oy: y });
}
function spawnCollectible() {
  const t = collectibleTypes[Math.floor(Math.random()*collectibleTypes.length)];
  const y = GROUND_Y - 50 - Math.random()*60;
  collectibles.push({ ...t, x: W+10, y, wobble: Math.random()*Math.PI*2 });
}

// ── Draw Player (curly-haired boy with red cap) ──
function drawPlayer(x, y, ducking) {
  if(player.invincible>0 && Math.floor(player.blinkTimer/4)%2===0) return;
  ctx.save();
  ctx.translate(x, y);
  const h = ducking ? 35 : 50;
  const headY = ducking ? 5 : 0;

  // Legs animation
  const legSwing = Math.sin(frameCount*0.3)*8;
  if(!ducking) {
    ctx.fillStyle='#4338ca';
    ctx.fillRect(8, 32, 10, 18);
    ctx.fillRect(18, 32, 10, 18);
    // Shoes
    ctx.fillStyle='#1e1b4b';
    ctx.beginPath(); ctx.ellipse(10, 49, 7, 4, legSwing*0.05, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(26, 49, 7, 4, -legSwing*0.05, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#4338ca';
    ctx.fillRect(2, 22, 32, 12);
    ctx.fillStyle='#1e1b4b';
    ctx.beginPath(); ctx.ellipse(10, 33, 8, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(26, 33, 8, 5, 0, 0, Math.PI*2); ctx.fill();
  }

  // Body - plaid shirt
  ctx.fillStyle='#d4a96a';
  ctx.fillRect(4, ducking?8:16, 28, ducking?16:18);
  ctx.strokeStyle='rgba(100,60,20,0.4)'; ctx.lineWidth=1.5;
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(4+i*7,ducking?8:16);ctx.lineTo(4+i*7,ducking?24:34);ctx.stroke();}
  for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(4,ducking?8+i*5:16+i*6);ctx.lineTo(32,ducking?8+i*5:16+i*6);ctx.stroke();}
  // Blue shirt visible
  ctx.fillStyle='#3b82f6';
  ctx.fillRect(10, ducking?10:20, 16, ducking?8:10);

  if(!ducking) {
    // Arms
    ctx.fillStyle='#d4a96a';
    ctx.save(); ctx.translate(4,20); ctx.rotate(-legSwing*0.05);
    ctx.fillRect(-6,0,8,14); ctx.restore();
    ctx.save(); ctx.translate(32,20); ctx.rotate(legSwing*0.05);
    ctx.fillRect(0,0,8,14); ctx.restore();
  }

  // Head
  ctx.fillStyle='#deb887';
  ctx.beginPath(); ctx.ellipse(18, headY+8, 13, 12, 0, 0, Math.PI*2); ctx.fill();

  // Curly hair - brown curls
  ctx.fillStyle='#5c3317';
  const hairPositions = [
    [-2, headY-4, 8, 7], [6, headY-6, 7, 7], [14, headY-7, 8, 7], [22, headY-5, 7, 7],
    [-4, headY+2, 7, 7], [26, headY+2, 7, 7]
  ];
  hairPositions.forEach(([hx,hy,hw,hh])=>{
    ctx.beginPath(); ctx.ellipse(hx+hw/2,hy+hh/2,hw/2,hh/2,0,0,Math.PI*2); ctx.fill();
  });
  // Extra curl detail
  ctx.fillStyle='#4a2810';
  [[0,headY-2,5,5],[8,headY-4,5,5],[16,headY-5,5,5],[24,headY-3,5,5]].forEach(([hx,hy,hw,hh])=>{
    ctx.beginPath(); ctx.ellipse(hx+hw/2,hy+hh/2,hw/2,hh/2,0,0,Math.PI*2); ctx.fill();
  });

  // Red cap
  ctx.fillStyle='#dc2626';
  ctx.beginPath(); ctx.ellipse(18, headY+4, 16, 5, 0, 0, Math.PI); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(18, headY-5, 14, 9, 0, Math.PI, Math.PI*2); ctx.fill();
  // Cap logo
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.moveTo(15,headY-7); ctx.lineTo(22,headY-4); ctx.lineTo(15,headY-1); ctx.closePath(); ctx.fill();

  // Eyes
  ctx.fillStyle='#3d1f00';
  ctx.beginPath(); ctx.ellipse(13, headY+7, 2.5, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(23, headY+7, 2.5, 2.5, 0, 0, Math.PI*2); ctx.fill();
  // Eye shine
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(14,headY+6,1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(24,headY+6,1,0,Math.PI*2); ctx.fill();

  // Lips
  ctx.fillStyle='#c27b5a';
  ctx.beginPath(); ctx.arc(18, headY+13, 4, 0, Math.PI); ctx.fill();

  // Collect hearts anim
  if(player.collectAnim > 0) {
    ctx.globalAlpha = player.collectAnim;
    ctx.font = '16px serif'; ctx.fillText('💖', 20, -10);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ── Draw Girlfriend ──
function drawGirlfriend(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Dress - pink
  ctx.fillStyle='#fb7185';
  ctx.beginPath();
  ctx.moveTo(8,18); ctx.lineTo(28,18); ctx.lineTo(34,56); ctx.lineTo(2,56); ctx.closePath();
  ctx.fill();
  // Dress shine
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.moveTo(11,18); ctx.lineTo(18,18); ctx.lineTo(14,40); ctx.lineTo(9,38); ctx.closePath();
  ctx.fill();

  // Legs
  ctx.fillStyle='#fde68a';
  ctx.fillRect(10,50,8,10); ctx.fillRect(20,50,8,10);
  ctx.fillStyle='#be185d';
  ctx.beginPath(); ctx.ellipse(14,59,6,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(24,59,6,4,0,0,Math.PI*2); ctx.fill();

  // Arms holding cake
  ctx.fillStyle='#deb887';
  ctx.fillRect(0,20,9,16); ctx.fillRect(25,20,9,16);

  // Head
  ctx.fillStyle='#deb887';
  ctx.beginPath(); ctx.ellipse(17, 8, 11, 11, 0, 0, Math.PI*2); ctx.fill();

  // Long hair
  ctx.fillStyle='#2d1b00';
  ctx.beginPath(); ctx.ellipse(17,-2,12,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(5,4,6,22); ctx.fillRect(23,4,6,22);
  // Hair color
  ctx.fillStyle='#5c3317';
  ctx.beginPath(); ctx.ellipse(17,-1,10,6,0,0,Math.PI*2); ctx.fill();

  // Eyes
  ctx.fillStyle='#3d1f00';
  ctx.beginPath(); ctx.ellipse(12,8,2,2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(22,8,2,2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(13,7,0.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(23,7,0.8,0,Math.PI*2); ctx.fill();

  // Smile
  ctx.strokeStyle='#c27b5a'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(17,12,4,0.1,Math.PI-0.1); ctx.stroke();

  // Blush
  ctx.fillStyle='rgba(255,150,150,0.4)';
  ctx.beginPath(); ctx.ellipse(9,11,3,2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(25,11,3,2,0,0,Math.PI*2); ctx.fill();

  // Birthday cake
  const cakeWobble = Math.sin(girlfriend.cakeAnim*0.1)*2;
  ctx.fillStyle='#fde68a';
  ctx.fillRect(4, 34+cakeWobble, 26, 16);
  ctx.fillStyle='#fb7185';
  ctx.fillRect(4, 34+cakeWobble, 26, 5);
  // Candles
  ctx.fillStyle='#fff';
  ctx.fillRect(10,28+cakeWobble,4,8); ctx.fillRect(20,28+cakeWobble,4,8);
  // Flames
  ctx.fillStyle='#fbbf24';
  ctx.beginPath(); ctx.ellipse(12,27+cakeWobble+Math.sin(frameCount*0.2)*1,2,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(22,27+cakeWobble+Math.cos(frameCount*0.2)*1,2,3,0,0,Math.PI*2); ctx.fill();
  // Stars on cake
  ctx.font='8px serif';
  ctx.fillText('✨',5,46+cakeWobble); ctx.fillText('💖',17,46+cakeWobble);

  ctx.restore();
}

// ── Draw Obstacle ──
function drawObstacle(o) {
  ctx.save();
  ctx.font = `${Math.min(o.w,o.h)*0.9}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(o.sym, o.x+o.w/2, o.y+o.h/2);
  ctx.restore();
}

// ── Draw Collectible ──
function drawCollectible(c) {
  c.wobble += 0.08;
  const wy = Math.sin(c.wobble)*4;
  ctx.save();
  ctx.font='22px serif';
  ctx.textAlign='center';
  ctx.fillText(c.sym, c.x, c.y+wy);
  // Glow
  ctx.shadowColor=c.color; ctx.shadowBlur=15;
  ctx.fillText(c.sym, c.x, c.y+wy);
  ctx.restore();
}

// ── Draw Background ──
function drawBackground() {
  const s = stages[stageIndex];
  // Sky gradient
  const grad = ctx.createLinearGradient(0,0,0,GROUND_Y);
  grad.addColorStop(0, s.sky[0]);
  grad.addColorStop(1, s.sky[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,GROUND_Y);

  // Stars
  stars.forEach(st => {
    st.twinkle += 0.05; st.x -= st.speed;
    if(st.x < 0) { st.x = W; st.y = Math.random()*(GROUND_Y-20); }
    const alpha = 0.4+0.6*Math.abs(Math.sin(st.twinkle));
    ctx.fillStyle=`rgba(255,230,255,${alpha})`;
    ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,Math.PI*2); ctx.fill();
  });

  // Floating petals
  bgPetals.forEach(p => {
    p.x -= p.speed; p.y += p.drift; p.rot += 0.02;
    if(p.x < -10) { p.x = W+10; p.y = Math.random()*GROUND_Y; }
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=p.color; ctx.globalAlpha=0.6;
    ctx.beginPath(); ctx.ellipse(0,0,p.size/2,p.size,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Distant hills/clouds
  ctx.fillStyle='rgba(255,150,200,0.08)';
  for(let i=0;i<4;i++) {
    ctx.beginPath();
    ctx.ellipse(100+i*200+((frameCount*0.5)%(W+400))*0, GROUND_Y-20, 80, 30, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // Ground
  const gGrad = ctx.createLinearGradient(0,GROUND_Y,0,H);
  gGrad.addColorStop(0, s.ground);
  gGrad.addColorStop(1, adjustColor(s.ground,-30));
  ctx.fillStyle = gGrad;
  ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);

  // Ground line glow
  ctx.strokeStyle = s.accent;
  ctx.lineWidth = 2;
  ctx.shadowColor = s.accent;
  ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.moveTo(0,GROUND_Y); ctx.lineTo(W,GROUND_Y); ctx.stroke();
  ctx.shadowBlur = 0;

  // Ground details (moving flowers)
  const offset = (frameCount * speed) % 120;
  for(let i=0;i<8;i++) {
    const fx = ((i*120 - offset + W*2) % (W+120)) - 10;
    ctx.font='16px serif';
    ctx.fillText(i%3===0?'🌸':i%3===1?'💐':'🌺', fx, GROUND_Y+22);
  }
}

function adjustColor(hex, amt) {
  const n = parseInt(hex.slice(1),16);
  const r = Math.max(0,Math.min(255,(n>>16)+amt));
  const g = Math.max(0,Math.min(255,((n>>8)&0xff)+amt));
  const b = Math.max(0,Math.min(255,(n&0xff)+amt));
  return `rgb(${r},${g},${b})`;
}

// ── Collision ──
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

// ── Floating Hearts ──
function spawnHeart(x,y) {
  hearts.push({ x, y, vy:-2-Math.random()*1, vx:(Math.random()-0.5)*2, life:1, r:6+Math.random()*6 });
}

// ── Floating Text ──
function showLoveMsg(msg) {
  const el = document.getElementById('loveMessage');
  el.textContent = msg;
  el.style.opacity = 1;
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity=0; },2500);
}

// ── UI ──
function updateUI() {
  document.getElementById('score').textContent = `💖 Cartas: ${score}`;
  document.getElementById('stage').textContent = stages[stageIndex].name;
  const livesStr = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0,3-lives));
  document.getElementById('lives').textContent = livesStr;
}

// ── Fireworks ──
let fireworks = [];
function spawnFirework() {
  const x = 50+Math.random()*(W-100);
  const y = 30+Math.random()*100;
  const hue = Math.random()*360;
  for(let i=0;i<20;i++) {
    const a = (i/20)*Math.PI*2;
    const spd = 3+Math.random()*4;
    fireworks.push({ x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-2, life:1, color:`hsl(${hue},100%,70%)`, r:3 });
  }
  // Heart firework
  for(let t=0;t<20;t++) {
    const a = (t/20)*Math.PI*2;
    const hx2 = 16*(Math.sin(a)**3);
    const hy2 = -(13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a));
    fireworks.push({ x: x+hx2*3, y: y+hy2*3, vx:0, vy:0, life:1, color:'#ff4d8a', r:2, isHeart:true });
  }
}

// ── Win Scene ──
let winTimer = 0, winFireworkTimer = 0;
function drawWinScene() {
  drawBackground();

  // Draw girlfriend with glow
  ctx.shadowColor='#ff80b5'; ctx.shadowBlur=20;
  girlfriend.cakeAnim++;
  drawGirlfriend(girlfriend.x, girlfriend.y);
  ctx.shadowBlur=0;

  // Draw player
  drawPlayer(player.x, player.y, false);

  // Letters floating from player to girlfriend
  if(winTimer > 60 && winTimer < 160) {
    const t = (winTimer-60)/100;
    const lx = player.x + (girlfriend.x - player.x)*t;
    const ly = player.y + Math.sin(t*Math.PI)*(-60);
    ctx.font='20px serif'; ctx.textAlign='center';
    ctx.fillText('💌', lx, ly);
  }

  // Hearts everywhere
  for(let i=0;i<3;i++) {
    if(Math.random()<0.3) spawnHeart(Math.random()*W, Math.random()*GROUND_Y);
  }

  // Fireworks
  winFireworkTimer++;
  if(winFireworkTimer%40===0) spawnFirework();

  fireworks.forEach(f => {
    f.x+=f.vx; f.y+=f.vy; f.vy+=0.1; f.life-=0.018;
    ctx.globalAlpha=Math.max(0,f.life);
    ctx.fillStyle=f.color;
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
  fireworks = fireworks.filter(f=>f.life>0);

  // Hearts draw
  drawHearts();
  drawParticles();

  // Message box
  if(winTimer > 80) {
    const alpha = Math.min(1,(winTimer-80)/60);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(10,5,30,0.85)';
    ctx.beginPath();
    roundRect(ctx, W/2-270, 40, 540, 220, 16);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,150,200,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath(); roundRect(ctx, W/2-270, 40, 540, 220, 16); ctx.stroke();

    ctx.fillStyle='#fff';
    ctx.font='bold 22px Dancing Script, cursive';
    ctx.textAlign='center';
    ctx.fillText('💖 Feliz cumpleaños. 💖', W/2, 80);

    ctx.font='14px Nunito, sans-serif';
    ctx.fillStyle='#ffd6e7';
    const lines = [
      'Este pequeño juego es solo una forma de decirte',
      'lo importante que eres para mí.',
      'Gracias por existir y por llenar mi vida',
      'de momentos hermosos.',
      '',
      'Hoy celebro tu vida...',
      'y la suerte que tengo de tenerte en la mía. 💖'
    ];
    lines.forEach((l,i) => ctx.fillText(l, W/2, 108+i*20));
    ctx.globalAlpha=1;
  }

  winTimer++;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── Draw Hearts ──
function drawHearts() {
  hearts.forEach(h => {
    h.y+=h.vy; h.x+=h.vx; h.life-=0.02; h.vy*=0.98;
    ctx.globalAlpha=Math.max(0,h.life);
    ctx.font=`${h.r*2}px serif`;
    ctx.textAlign='center';
    ctx.fillText('💖',h.x,h.y);
    ctx.globalAlpha=1;
  });
  hearts = hearts.filter(h=>h.life>0);
}

function drawParticles() {
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.05;
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
  particles=particles.filter(p=>p.life>0);
}

// ── Start Screen ──
function drawStartScreen() {
  drawBackground();

  // Title
  ctx.save();
  ctx.shadowColor='#ff80b5'; ctx.shadowBlur=30;
  ctx.font='bold 42px Dancing Script, cursive';
  ctx.fillStyle='#ffd6e7';
  ctx.textAlign='center';
  ctx.fillText('💖 Corriendo Hacia Ti 💖', W/2, 110);
  ctx.shadowBlur=0;

  ctx.font='18px Nunito, sans-serif';
  ctx.fillStyle='rgba(255,210,230,0.9)';
  ctx.fillText('Un regalo hecho con amor 🌹', W/2, 148);

  ctx.font='14px Nunito, sans-serif';
  ctx.fillStyle='rgba(255,200,220,0.7)';
  ctx.fillText('Recolecta cartas de amor y llega hasta ella', W/2, 200);
  ctx.fillText('Salta los obstáculos del camino...', W/2, 222);

  // Pulsing start button
  const pulse = 0.9 + Math.sin(frameCount*0.08)*0.1;
  ctx.save();
  ctx.translate(W/2, 272);
  ctx.scale(pulse, pulse);
  ctx.fillStyle='rgba(219,39,119,0.9)';
  ctx.beginPath(); roundRect(ctx, -100,-22,200,44,22); ctx.fill();
  ctx.strokeStyle='rgba(255,180,220,0.8)'; ctx.lineWidth=2;
  ctx.beginPath(); roundRect(ctx, -100,-22,200,44,22); ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.font='bold 16px Nunito, sans-serif';
  ctx.textAlign='center';
  ctx.fillText('▶  Comenzar  ▶', 0, 6);
  ctx.restore();

  // Draw a small preview of characters
  drawPlayer(W/2-80, 240, false);
  drawGirlfriend(W/2+50, 240);

  ctx.restore();

  frameCount++;
  hearts.forEach(h=>{ h.y+=h.vy; h.x+=h.vx; h.life-=0.015; h.vy*=0.99; });
  hearts = hearts.filter(h=>h.life>0);
  if(Math.random()<0.04) spawnHeart(Math.random()*W, GROUND_Y-20);
  drawHearts();
}

// ── Dead Screen ──
function drawDeadScreen() {
  drawBackground();
  drawPlayer(player.x, player.y, false);
  ctx.fillStyle='rgba(10,5,30,0.75)';
  ctx.fillRect(0,0,W,H);

  ctx.font='bold 32px Dancing Script, cursive';
  ctx.fillStyle='#ffd6e7';
  ctx.textAlign='center';
  ctx.shadowColor='#ff4080'; ctx.shadowBlur=20;
  ctx.fillText('💔 ¡El amor necesita fuerza!', W/2, 130);
  ctx.shadowBlur=0;

  ctx.font='16px Nunito, sans-serif';
  ctx.fillStyle='rgba(255,200,220,0.8)';
  ctx.fillText(`Cartas recolectadas: ${score} 💌`, W/2, 180);
  ctx.fillText('¡No te rindas! Vuelve a intentarlo...', W/2, 210);

  const pulse = 0.9+Math.sin(frameCount*0.08)*0.1;
  ctx.save(); ctx.translate(W/2,260); ctx.scale(pulse,pulse);
  ctx.fillStyle='rgba(219,39,119,0.9)';
  ctx.beginPath(); roundRect(ctx,-100,-22,200,44,22); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 16px Nunito';
  ctx.textAlign='center'; ctx.fillText('💖 Intentar de nuevo', 0, 6);
  ctx.restore();

  frameCount++;
}

// ── Main Loop ──
function gameLoop() {
  ctx.clearRect(0,0,W,H);

  if(state==='start') {
    drawStartScreen();
  } else if(state==='dead') {
    drawDeadScreen();
  } else if(state==='win') {
    drawWinScene();
  } else if(state==='playing') {
    frameCount++;
    stageProgress += speed * 0.002;

    // Stage transitions
    if(stageProgress > 1 && stageIndex < stages.length-1) {
      stageIndex++;
      stageProgress = 0;
      speed = Math.min(9, speed + 0.5);
      updateUI();
    }
    // Summon girlfriend near the end
    if(stageIndex === stages.length-1 && stageProgress > 0.5 && girlfriend.x > W-150) {
      girlfriend.x -= 1;
    }
    if(stageIndex === stages.length-1 && stageProgress > 0.85 && !girlfriend.arrived) {
      girlfriend.x = W - 160;
      girlfriend.arrived = true;
    }

    // Check win
    if(girlfriend.arrived && player.x + player.w >= girlfriend.x - 20) {
      playWin();
      state = 'win';
      winTimer = 0;
      requestAnimationFrame(gameLoop);
      return;
    }

    // Physics
    player.vy += 0.7; // gravity
    player.y += player.vy;
    if(player.y >= GROUND_Y - (player.ducking?35:player.h)) {
      player.y = GROUND_Y - (player.ducking?35:player.h);
      player.vy = 0;
      player.onGround = true;
      player.jumpCount = 0;
    } else {
      player.onGround = false;
    }

    // Duck
    player.ducking = !!(keys['ArrowDown'] || keys['KeyS']);

    // Invincibility blink
    if(player.invincible > 0) { player.invincible--; player.blinkTimer++; }
    else player.blinkTimer = 0;

    // Collect anim
    if(player.collectAnim > 0) player.collectAnim -= 0.05;

    // Speed increase
    if(frameCount % 600 === 0) speed = Math.min(10, speed + 0.3);

    // Spawn obstacles
    lastObstacle++;
    const spawnInterval = Math.max(60, 130 - speed*8);
    if(lastObstacle > spawnInterval + Math.random()*40) {
      spawnObstacle(); lastObstacle = 0;
    }

    // Spawn collectibles
    lastCollectible++;
    if(lastCollectible > 70 + Math.random()*50) {
      spawnCollectible(); lastCollectible = 0;
    }

    // Move obstacles
    obstacles.forEach(o => { o.x -= speed; });
    obstacles = obstacles.filter(o => o.x > -100);

    // Move collectibles
    collectibles.forEach(c => { c.x -= speed; });
    collectibles = collectibles.filter(c => c.x > -50);

    // Girlfriend approach
    if(girlfriend.arrived) { girlfriend.x = Math.max(W-160, girlfriend.x - 0.5); }

    // Collision - obstacles
    if(player.invincible === 0) {
      for(let o of obstacles) {
        const ph = player.ducking ? 35 : player.h;
        if(rectsOverlap(player.x+6, player.y+4, player.w-10, ph-8, o.x+4, o.y+4, o.w-8, o.h-8)) {
          lives--;
          player.invincible = 90;
          playHit();
          for(let i=0;i<10;i++) hearts.push({ x:player.x+18, y:player.y, vy:-3-Math.random()*2, vx:(Math.random()-0.5)*4, life:1, r:8 });
          if(lives <= 0) { state='dead'; }
          updateUI();
          break;
        }
      }
    }

    // Collision - collectibles
    for(let i=collectibles.length-1;i>=0;i--) {
      const c = collectibles[i];
      if(rectsOverlap(player.x+4, player.y+4, player.w-8, player.h-8, c.x-12, c.y-12, 24, 24)) {
        score += c.pts;
        player.collectAnim = 1;
        playCollect();
        if(c.msg) {
          showLoveMsg(loveMessages[msgIndex % loveMessages.length]);
          msgIndex++;
        }
        for(let j=0;j<5;j++) spawnHeart(c.x, c.y);
        for(let j=0;j<6;j++) particles.push({
          x:c.x, y:c.y, vx:(Math.random()-0.5)*5, vy:-2-Math.random()*3,
          life:1, color:c.color, r:4
        });
        collectibles.splice(i,1);
        updateUI();
      }
    }

    // Draw
    drawBackground();
    obstacles.forEach(drawObstacle);
    collectibles.forEach(drawCollectible);

    if(girlfriend.arrived) {
      ctx.shadowColor='#ff80b5'; ctx.shadowBlur=20;
      girlfriend.cakeAnim++;
      drawGirlfriend(girlfriend.x, girlfriend.y);
      ctx.shadowBlur=0;
    }

    drawPlayer(player.x, player.y, player.ducking);
    drawHearts();
    drawParticles();

    // Progress bar
    const prog = (stageIndex + stageProgress) / stages.length;
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(10, H-18, W-20, 6);
    const barGrad = ctx.createLinearGradient(10,0,W-10,0);
    barGrad.addColorStop(0,'#f43f5e'); barGrad.addColorStop(0.5,'#c084fc'); barGrad.addColorStop(1,'#fbbf24');
    ctx.fillStyle=barGrad;
    ctx.fillRect(10, H-18, (W-20)*prog, 6);
    ctx.font='10px sans-serif'; ctx.fillStyle='rgba(255,220,240,0.8)'; ctx.textAlign='right';
    ctx.fillText('💖 Hacia ella', W-12, H-20);
  }

  requestAnimationFrame(gameLoop);
}

// Initial hearts for atmosphere
for(let i=0;i<20;i++) {
  hearts.push({ x:Math.random()*W, y:Math.random()*H, vy:-0.5-Math.random(), vx:(Math.random()-0.5)*0.5, life:Math.random(), r:6+Math.random()*6 });
}

gameLoop();
</script>
